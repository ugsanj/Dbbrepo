# docker-compose.yaml - Airflow minimal untuk belajar
version: '3.8'
services:
  airflow:
    image: apache/airflow:2.10.0-python3.11
    environment:
      - AIRFLOW__CORE__EXECUTOR=SequentialExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=sqlite:////opt/airflow/airflow.db
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
    volumes:
      - ./dags:/opt/airflow/dags      # Taruh file DAG kamu di sini
      - ./data:/opt/airflow/data      # Taruh CSV di sini
    ports:
      - "8080:8080"
    command: bash -c "airflow db init && airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com && airflow standalone"